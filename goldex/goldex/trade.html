<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoldEx — Trade XAU/USD</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#F0B429;--gold-dim:#8a6a00;--gold-light:#FFD97D;--bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;--bg4:#242424;--border:#2a2a2a;--text:#f0f0f0;--text-dim:#777;--green:#22c55e;--red:#ef4444;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:100;}
.logo{font-size:20px;font-weight:800;text-decoration:none;color:var(--text);}
.logo span{color:var(--gold);}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-link{color:var(--text-dim);text-decoration:none;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;transition:all 0.2s;}
.nav-link:hover{color:var(--text);background:var(--bg3);}
.nav-link.active{color:var(--gold);background:rgba(240,180,41,0.08);}
.nav-right{display:flex;align-items:center;gap:12px;}
.user-pill{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;}
.user-av{width:26px;height:26px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#000;}
.logout-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all 0.2s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

.main{display:grid;grid-template-columns:1fr 300px;gap:16px;padding:16px 24px;max-width:1300px;margin:0 auto;}

/* PRICE BAR */
.price-bar{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 24px;margin-bottom:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;margin-right:6px;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.25;}}
.pb-sym{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--text-dim);}
.pb-price{font-size:34px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--gold);transition:color 0.3s;}
.pb-chg{font-size:13px;font-family:'JetBrains Mono',monospace;padding:4px 10px;border-radius:6px;}
.pb-chg.up{background:rgba(34,197,94,0.12);color:var(--green);}
.pb-chg.dn{background:rgba(239,68,68,0.12);color:var(--red);}
.pb-meta{margin-left:auto;display:flex;gap:20px;}
.pb-item label{font-size:10px;color:var(--text-dim);display:block;margin-bottom:2px;letter-spacing:1px;}
.pb-item span{font-size:13px;font-family:'JetBrains Mono',monospace;}

/* CHART */
.chart-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
.chart-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.box-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;}
canvas{width:100%!important;}

/* POSITIONS */
.box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;}
.pos-row{display:grid;grid-template-columns:80px 1fr 1fr auto;gap:8px;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);font-size:13px;}
.pos-row:last-child{border-bottom:none;}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;display:inline-block;}
.badge.buy{background:rgba(34,197,94,0.12);color:var(--green);}
.badge.sell{background:rgba(239,68,68,0.12);color:var(--red);}
.pnl.pos{color:var(--green);}
.pnl.neg{color:var(--red);}
.close-btn{background:var(--bg4);border:1px solid var(--border);color:var(--text-dim);padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;transition:all 0.2s;}
.close-btn:hover{background:var(--red);color:#fff;border-color:var(--red);}
.mono{font-family:'JetBrains Mono',monospace;}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:14px;}
.wallet-card{background:linear-gradient(135deg,#1c1600,#0d0d0d);border:1px solid var(--gold-dim);border-radius:12px;padding:18px;position:relative;overflow:hidden;}
.wallet-card::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(circle,rgba(240,180,41,0.12),transparent 70%);}
.wc-label{font-size:10px;letter-spacing:2px;color:var(--gold-dim);font-weight:700;text-transform:uppercase;margin-bottom:6px;}
.wc-bal{font-size:26px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--gold);}
.wc-row{display:flex;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid rgba(240,180,41,0.15);}
.wc-item label{font-size:10px;color:var(--text-dim);display:block;margin-bottom:2px;letter-spacing:1px;}
.wc-item span{font-size:13px;font-family:'JetBrains Mono',monospace;}

.trade-panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;}
.trade-tabs{display:flex;background:var(--bg3);border-radius:9px;padding:3px;margin-bottom:16px;}
.trade-tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--text-dim);border-radius:7px;transition:all 0.2s;font-family:'Syne',sans-serif;}
.trade-tab.buy.active{background:rgba(34,197,94,0.2);color:var(--green);}
.trade-tab.sell.active{background:rgba(239,68,68,0.2);color:var(--red);}
.field{margin-bottom:13px;}
.field label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text-dim);display:block;margin-bottom:6px;text-transform:uppercase;}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:var(--gold);}
.lot-btns{display:flex;gap:5px;margin-bottom:13px;}
.lot-btn{flex:1;padding:7px 3px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;color:var(--text-dim);transition:all 0.2s;font-family:'Syne',sans-serif;}
.lot-btn:hover{border-color:var(--gold);color:var(--gold);}
.exec-btn{width:100%;padding:13px;border-radius:9px;border:none;cursor:pointer;font-size:14px;font-weight:800;letter-spacing:0.5px;font-family:'Syne',sans-serif;transition:all 0.2s;}
.exec-btn.buy{background:var(--green);color:#000;}
.exec-btn.sell{background:var(--red);color:#fff;}
.exec-btn:hover{opacity:0.9;transform:translateY(-1px);}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 22px;font-size:13px;font-weight:600;z-index:999;transition:transform 0.3s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{border-color:var(--green);color:var(--green);}
.toast.error{border-color:var(--red);color:var(--red);}

@media(max-width:900px){.main{grid-template-columns:1fr;}.nav-links{display:none;}.pb-meta{display:none;}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Gold<span>Ex</span></a>
  <div class="nav-links">
    <a href="home.html" class="nav-link">Dashboard</a>
    <a href="trade.html" class="nav-link active">Trade</a>
    <a href="wallet.html" class="nav-link">Wallet</a>
    <a href="leaderboard.html" class="nav-link">Leaderboard</a>
  </div>
  <div class="nav-right">
    <div class="user-pill"><div class="user-av" id="userAv">D</div><span id="userName">Trader</span></div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="main">
  <!-- LEFT -->
  <div>
    <div class="price-bar">
      <div>
        <div class="pb-sym"><span class="live-dot"></span>XAU / USD</div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:2px;">
          <div class="pb-price" id="livePrice">Loading...</div>
          <span class="pb-chg up" id="priceChg">+0.00%</span>
        </div>
      </div>
      <div class="pb-meta">
        <div class="pb-item"><label>HIGH</label><span id="dHigh">—</span></div>
        <div class="pb-item"><label>LOW</label><span id="dLow">—</span></div>
        <div class="pb-item"><label>SPREAD</label><span>$0.30</span></div>
        <div class="pb-item"><label>UPDATED</label><span id="lastUpd">—</span></div>
      </div>
    </div>

    <div class="chart-box">
      <div class="chart-hdr">
        <div class="box-title">XAU/USD Live Chart</div>
        <div id="priceSource" style="font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;">Connecting...</div>
      </div>
      <canvas id="chart" height="170"></canvas>
    </div>

    <div class="box">
      <div class="box-title" style="margin-bottom:16px;">Open Positions</div>
      <div id="posList"><div style="color:var(--text-dim);font-size:13px;text-align:center;padding:20px 0;">No open positions.</div></div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="wallet-card">
      <div class="wc-label">Demo Balance</div>
      <div class="wc-bal" id="wBal">$10,000.00</div>
      <div class="wc-row">
        <div class="wc-item"><label>EQUITY</label><span id="wEq">$10,000.00</span></div>
        <div class="wc-item"><label>P&L</label><span id="wPnl" style="color:var(--text)">$0.00</span></div>
        <div class="wc-item"><label>OZ HELD</label><span id="wOz">0.000</span></div>
      </div>
    </div>

    <div class="trade-panel">
      <div class="box-title" style="margin-bottom:14px;">Place Order</div>
      <div class="trade-tabs">
        <button class="trade-tab buy active" id="buyTab" onclick="setMode('buy')">▲ BUY</button>
        <button class="trade-tab sell" id="sellTab" onclick="setMode('sell')">▼ SELL</button>
      </div>
      <div class="field"><label>Amount (USD)</label><input type="number" id="tradeAmt" value="100" min="10" step="10" oninput="calcOz()"></div>
      <div class="lot-btns">
        <button class="lot-btn" onclick="setAmt(100)">$100</button>
        <button class="lot-btn" onclick="setAmt(500)">$500</button>
        <button class="lot-btn" onclick="setAmt(1000)">$1K</button>
        <button class="lot-btn" onclick="setAmt(5000)">$5K</button>
      </div>
      <div style="font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;margin-bottom:12px;" id="ozHint">≈ 0.0000 oz</div>
      <div class="field"><label>Entry Price</label><input type="text" id="entryDisplay" readonly></div>
      <button class="exec-btn buy" id="execBtn" onclick="executeTrade()">▲ BUY GOLD</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Auth
const userStr=localStorage.getItem('goldex_user');
if(!userStr){window.location.href='login.html';}
const user=JSON.parse(userStr);
document.getElementById('userName').textContent=user.name.split(' ')[0];
document.getElementById('userAv').textContent=user.name.charAt(0).toUpperCase();
function logout(){localStorage.removeItem('goldex_user');window.location.href='login.html';}

// State
function getState(){return JSON.parse(localStorage.getItem('goldex_state')||JSON.stringify({balance:10000,positions:[],trades:[],transactions:[],totalDep:10000,totalWit:0}));}
function saveState(s){localStorage.setItem('goldex_state',JSON.stringify(s));}

let price=0,basePrice=0,priceHistory=[],mode='buy',pid=1,dHigh=0,dLow=Infinity;

// Chart
const canvas=document.getElementById('chart');
const ctx=canvas.getContext('2d');
function resizeCanvas(){canvas.width=canvas.parentElement.offsetWidth-40;canvas.height=170;drawChart();}
window.addEventListener('resize',resizeCanvas);

function drawChart(){
  if(!canvas.width)return;
  const w=canvas.width,h=canvas.height;
  ctx.clearRect(0,0,w,h);
  const pts=priceHistory.slice(-100);
  if(pts.length<2)return;
  const min=Math.min(...pts)-2,max=Math.max(...pts)+2,range=max-min;
  const isUp=pts[pts.length-1]>=pts[0];
  const col=isUp?'#22c55e':'#ef4444';
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
  for(let i=0;i<=3;i++){const y=(i/3)*h;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='10px JetBrains Mono,monospace';
    ctx.fillText((max-(i/3)*range).toFixed(1),4,y-3);}
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,isUp?'rgba(34,197,94,0.2)':'rgba(239,68,68,0.2)');
  g.addColorStop(1,'transparent');
  ctx.beginPath();pts.forEach((p,i)=>{const x=(i/(pts.length-1))*w,y=h-((p-min)/range)*h;i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=2;ctx.lineJoin='round';
  pts.forEach((p,i)=>{const x=(i/(pts.length-1))*w,y=h-((p-min)/range)*h;i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
  ctx.stroke();
  const lx=w-2,ly=h-((pts[pts.length-1]-min)/range)*h;
  ctx.beginPath();ctx.arc(lx,ly,4,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
}

// Price
async function tick(){
  let p=null;
  try{
    const r=await fetch('https://metals.live/api/spot',{signal:AbortSignal.timeout(4000)});
    const d=await r.json();
    const g=d.find(x=>(x.symbol||'').toUpperCase()==='XAU'||(x.name||'').toLowerCase().includes('gold'));
    if(g){const v=parseFloat(g.price||g.bid||g.ask);if(v>100){p=v;document.getElementById('priceSource').textContent='Live price';}}
  }catch(e){}
  if(!p){if(!basePrice)basePrice=3310+Math.random()*60;basePrice+=(Math.random()-0.499)*2;p=parseFloat(basePrice.toFixed(2));document.getElementById('priceSource').textContent='Simulated';}
  else if(!basePrice)basePrice=p;
  const prev=price;price=p;
  priceHistory.push(p);if(priceHistory.length>300)priceHistory.shift();
  if(p>dHigh)dHigh=p;if(p<dLow)dLow=p;
  localStorage.setItem('goldex_price',p);
  const el=document.getElementById('livePrice');
  el.textContent='$'+p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  el.style.color=p>=prev?'var(--green)':'var(--red)';setTimeout(()=>el.style.color='var(--gold)',500);
  const base=priceHistory[0]||p,pct=((p-base)/base*100).toFixed(2);
  const ce=document.getElementById('priceChg');ce.textContent=(pct>=0?'+':'')+pct+'%';ce.className='pb-chg '+(pct>=0?'up':'dn');
  document.getElementById('dHigh').textContent='$'+dHigh.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  document.getElementById('dLow').textContent=dLow===Infinity?'—':'$'+dLow.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  document.getElementById('lastUpd').textContent=new Date().toLocaleTimeString();
  document.getElementById('entryDisplay').value='$'+p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  calcOz();updateWallet();renderPositions();drawChart();
}

function setMode(m){
  mode=m;
  document.getElementById('buyTab').className='trade-tab buy'+(m==='buy'?' active':'');
  document.getElementById('sellTab').className='trade-tab sell'+(m==='sell'?' active':'');
  const b=document.getElementById('execBtn');b.className='exec-btn '+m;b.textContent=(m==='buy'?'▲ BUY GOLD':'▼ SELL GOLD');
}
function setAmt(v){document.getElementById('tradeAmt').value=v;calcOz();}
function calcOz(){const a=parseFloat(document.getElementById('tradeAmt').value)||0;document.getElementById('ozHint').textContent='≈ '+(price?((a/price).toFixed(4)):0)+' oz at current price';}

function executeTrade(){
  const a=parseFloat(document.getElementById('tradeAmt').value);
  if(!a||a<10){toast('Minimum $10','error');return;}
  const s=getState();
  if(a>s.balance){toast('Insufficient balance','error');return;}
  if(!price){toast('Waiting for price...','error');return;}
  const oz=a/price;
  s.balance-=a;
  s.positions=s.positions||[];
  s.positions.push({id:pid++,type:mode,amount:a,oz,entry:price,time:new Date().toLocaleTimeString()});
  saveState(s);
  toast((mode==='buy'?'▲ BOUGHT ':'▼ SOLD ')+oz.toFixed(4)+' oz @ $'+price.toFixed(2),'success');
  updateWallet();renderPositions();
}

function closePos(id){
  const s=getState();
  const p=s.positions.find(x=>x.id===id);if(!p)return;
  const pnl=p.type==='buy'?(price-p.entry)*p.oz:(p.entry-price)*p.oz;
  s.balance+=p.amount+pnl;
  s.trades=s.trades||[];
  s.trades.push({...p,closePrice:price,pnl,closedAt:new Date().toLocaleTimeString()});
  s.positions=s.positions.filter(x=>x.id!==id);
  saveState(s);
  toast('Closed · P&L: '+(pnl>=0?'+':'')+'$'+pnl.toFixed(2),pnl>=0?'success':'error');
  updateWallet();renderPositions();
}

function renderPositions(){
  const s=getState();
  const el=document.getElementById('posList');
  if(!s.positions||!s.positions.length){el.innerHTML='<div style="color:var(--text-dim);font-size:13px;text-align:center;padding:20px 0;">No open positions.</div>';return;}
  el.innerHTML=s.positions.map(p=>{
    const pnl=p.type==='buy'?(price-p.entry)*p.oz:(p.entry-price)*p.oz;
    return `<div class="pos-row">
      <div><span class="badge ${p.type}">${p.type.toUpperCase()}</span><div style="font-size:10px;color:var(--text-dim);margin-top:3px;">${p.oz.toFixed(4)} oz</div></div>
      <div><div style="font-size:10px;color:var(--text-dim)">ENTRY</div><div class="mono" style="font-size:13px;">$${p.entry.toFixed(2)}</div></div>
      <div class="pnl ${pnl>=0?'pos':'neg'}">${pnl>=0?'+':''}$${pnl.toFixed(2)}</div>
      <button class="close-btn" onclick="closePos(${p.id})">Close</button>
    </div>`;
  }).join('');
}

function updateWallet(){
  const s=getState();
  const pnl=(s.positions||[]).reduce((sum,p)=>{const v=p.type==='buy'?(price-p.entry)*p.oz:(p.entry-price)*p.oz;return sum+v;},0);
  const equity=s.balance+(s.positions||[]).reduce((sum,p)=>sum+p.amount,0)+pnl;
  const gold=(s.positions||[]).filter(p=>p.type==='buy').reduce((s2,p)=>s2+p.oz,0);
  const fmt=n=>n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  document.getElementById('wBal').textContent='$'+fmt(s.balance);
  document.getElementById('wEq').textContent='$'+fmt(equity);
  document.getElementById('wOz').textContent=gold.toFixed(3);
  const pe=document.getElementById('wPnl');
  pe.textContent=(pnl>=0?'+$':'−$')+Math.abs(pnl).toFixed(2);
  pe.style.color=pnl>=0?'var(--green)':'var(--red)';
}

function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.className='toast',3000);}

setTimeout(resizeCanvas,100);
tick();setInterval(tick,3000);
</script>
</body>
</html>
