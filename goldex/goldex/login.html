<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>GoldEx — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#F0B429;--gold-dim:#8a6a00;--bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;--border:#2a2a2a;--text:#f0f0f0;--text-dim:#777;--green:#22c55e;--red:#ef4444;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
nav{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:1px solid var(--border);background:var(--bg2);}
.logo{font-size:22px;font-weight:800;text-decoration:none;color:var(--text);}
.logo span{color:var(--gold);}
.back{color:var(--text-dim);text-decoration:none;font-size:14px;font-weight:600;}
.back:hover{color:var(--gold);}
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(240,180,41,0.05),transparent 70%);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:440px;}
.card-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(240,180,41,0.1);border:1px solid rgba(240,180,41,0.25);padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--gold);margin-bottom:24px;}
.tabs{display:flex;background:var(--bg3);border-radius:10px;padding:4px;margin-bottom:28px;}
.tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--text-dim);border-radius:8px;transition:all 0.2s;font-family:'Syne',sans-serif;}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.4);}
.form-title{font-size:24px;font-weight:800;margin-bottom:6px;}
.form-sub{font-size:14px;color:var(--text-dim);margin-bottom:24px;}
.field{margin-bottom:16px;}
.field label{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text-dim);display:block;margin-bottom:6px;text-transform:uppercase;}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:14px;font-family:'Syne',sans-serif;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:var(--gold);}
.field input::placeholder{color:var(--text-dim);}
.submit-btn{width:100%;padding:14px;background:var(--gold);color:#000;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Syne',sans-serif;transition:all 0.2s;margin-top:4px;}
.submit-btn:hover{opacity:0.9;transform:translateY(-1px);}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;}
.notice{background:rgba(240,180,41,0.07);border:1px solid rgba(240,180,41,0.2);border-radius:10px;padding:14px;font-size:12px;color:var(--text-dim);line-height:1.6;margin-top:20px;}
.notice b{color:var(--gold);}
footer{padding:20px 40px;border-top:1px solid var(--border);background:var(--bg2);text-align:center;font-size:12px;color:var(--text-dim);}
footer a{color:var(--gold);text-decoration:none;}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Gold<span>Ex</span></a>
  <a href="index.html" class="back">← Back to Home</a>
</nav>

<div class="page">
  <div class="card">
    <div class="card-tag">🔐 SECURE ACCESS</div>
    <div class="tabs">
      <button class="tab active" id="loginTab" onclick="showTab('login')">Login</button>
      <button class="tab" id="registerTab" onclick="showTab('register')">Register</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
      <div class="form-title">Welcome back</div>
      <div class="form-sub">Sign in to your GoldEx account</div>
      <div class="error-msg" id="loginError"></div>
      <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="you@example.com"></div>
      <div class="field"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="submit-btn" id="loginBtn" onclick="doLogin()">Sign In →</button>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" style="display:none">
      <div class="form-title">Create account</div>
      <div class="form-sub">Start trading gold today</div>
      <div class="error-msg" id="registerError"></div>
      <div class="field"><label>Full Name</label><input type="text" id="regName" placeholder="John Doe"></div>
      <div class="field"><label>Email</label><input type="email" id="regEmail" placeholder="you@example.com"></div>
      <div class="field"><label>Phone (optional)</label><input type="tel" id="regPhone" placeholder="07XX XXX XXX"></div>
      <div class="field"><label>Password</label><input type="password" id="regPassword" placeholder="Min. 6 characters"></div>
      <button class="submit-btn" id="registerBtn" onclick="doRegister()">Create Account →</button>
    </div>

    <div class="notice"><b>Real platform:</b> Your account, balance and trades are stored securely in our database. No demo — real funds only.</div>
  </div>
</div>

<footer>GoldEx · <a href="index.html">Home</a></footer>

<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Redirect if already logged in
sb.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = 'home.html';
});

function showTab(t) {
  document.getElementById('loginForm').style.display = t === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = t === 'register' ? 'block' : 'none';
  document.getElementById('loginTab').className = 'tab' + (t === 'login' ? ' active' : '');
  document.getElementById('registerTab').className = 'tab' + (t === 'register' ? ' active' : '');
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  if (!email || !password) { errEl.textContent = 'Please fill all fields.'; errEl.style.display = 'block'; return; }

  btn.disabled = true; btn.textContent = 'Signing in...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    errEl.textContent = 'Invalid email or password.';
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign In →';
    return;
  }
  window.location.href = 'home.html';
}

async function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const password = document.getElementById('regPassword').value;
  const errEl = document.getElementById('registerError');
  const btn = document.getElementById('registerBtn');

  if (!name || !email || password.length < 6) {
    errEl.textContent = 'Please fill all fields. Password min 6 characters.';
    errEl.style.display = 'block'; return;
  }

  btn.disabled = true; btn.textContent = 'Creating account...';
  const { data, error } = await sb.auth.signUp({
    email, password,
    options: { data: { name, phone } }
  });

  if (error) {
    errEl.textContent = error.message;
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Create Account →';
    return;
  }

  // Insert profile
  await sb.from('profiles').upsert({ id: data.user.id, name, phone, balance: 0 });
  window.location.href = 'home.html';
}
</script>
</body>
</html>
