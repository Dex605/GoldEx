<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoldEx — Leaderboard</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.main{max-width:900px;margin:0 auto;padding:20px 16px;}
.page-header{text-align:center;margin-bottom:28px;}
.page-header h1{font-size:22px;font-weight:700;margin-bottom:4px;}
.page-header p{font-size:13px;color:var(--text3);}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin-bottom:28px;padding:0 16px;}
.pod-item{flex:1;max-width:180px;text-align:center;}
.pod-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;margin:0 auto 8px;border:3px solid transparent;}
.pod-av.r1{background:linear-gradient(135deg,var(--yellow),var(--yellow2));color:#000;border-color:var(--yellow);}
.pod-av.r2{background:linear-gradient(135deg,#9ca3af,#6b7280);color:#000;border-color:#9ca3af;}
.pod-av.r3{background:linear-gradient(135deg,#cd7f32,#8b4513);color:#fff;border-color:#cd7f32;}
.pod-name{font-size:13px;font-weight:600;margin-bottom:3px;}
.pod-score{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--green);}
.pod-block{border-radius:6px 6px 0 0;display:flex;align-items:center;justify-content:center;font-size:20px;margin-top:10px;}
.pod-block.b1{height:70px;background:rgba(240,185,11,0.12);border:1px solid rgba(240,185,11,0.3);}
.pod-block.b2{height:50px;background:rgba(156,163,175,0.1);border:1px solid rgba(156,163,175,0.3);}
.pod-block.b3{height:38px;background:rgba(205,127,50,0.1);border:1px solid rgba(205,127,50,0.3);}
.lb-box{border-radius:8px;overflow:hidden;}
.lb-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--bg2);}
.lb-row{display:grid;grid-template-columns:48px 1fr 120px 100px 80px;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);align-items:center;font-size:13px;transition:background 0.15s;}
.lb-row:last-child{border-bottom:none;}
.lb-row:hover{background:var(--bg2);}
.lb-row.header{font-size:10px;color:var(--text3);letter-spacing:1px;font-weight:600;text-transform:uppercase;}
.lb-row.me{background:rgba(240,185,11,0.05);border-left:3px solid var(--yellow);}
.rank{font-size:14px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.rank.gold{color:var(--yellow);}
.rank.silver{color:#9ca3af;}
.rank.bronze{color:#cd7f32;}
.trader-info{display:flex;align-items:center;gap:10px;}
.trader-av{width:30px;height:30px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.you-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;background:rgba(240,185,11,0.15);color:var(--yellow);border:1px solid rgba(240,185,11,0.3);margin-left:5px;}
@media(max-width:600px){.lb-row{grid-template-columns:40px 1fr 90px 70px;}.lb-row .hide-sm{display:none;}.podium{gap:5px;}.pod-av{width:40px;height:40px;font-size:16px;}}
</style>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="nav-logo">Gold<span class="g">Ex</span></a>
  <div class="nav-links">
    <a href="home.html" class="nav-link">Dashboard</a>
    <a href="trade.html" class="nav-link">Trade</a>
    <a href="wallet.html" class="nav-link">Wallet</a>
    <a href="leaderboard.html" class="nav-link active">Leaderboard</a>
  </div>
  <div class="nav-right">
    <div class="theme-toggle" onclick="toggleTheme()"><div class="theme-knob" id="themeKnob">🌙</div></div>
    <div class="nav-user">
      <div class="nav-av" id="navAv">?</div>
      <span class="nav-name" id="navName">...</span>
    </div>
    <button class="nav-btn" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="main">
  <div class="page-header">
    <h1>🏆 Leaderboard</h1>
    <p>Top traders ranked by portfolio balance</p>
  </div>
  <div id="podiumWrap"></div>
  <div class="lb-box card">
    <div class="lb-header">
      <div class="sec-label" style="margin-bottom:0">All Traders</div>
      <div style="font-size:11px;color:var(--text3)" id="lastRef">—</div>
    </div>
    <div class="lb-row header">
      <span>Rank</span><span>Trader</span><span>Balance</span><span>P&L</span><span class="hide-sm">Trades</span>
    </div>
    <div id="lbTable"><div class="empty">Loading...</div></div>
  </div>
</div>

<script src="goldex-shared.js"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null;
const demoTraders = [
  {name:'Alex Morgan',balance:14280,pnl:4280,trades:47},
  {name:'Fatima K.',balance:13100,pnl:3100,trades:31},
  {name:'Samuel O.',balance:12450,pnl:2450,trades:28},
  {name:'Priya R.',balance:11980,pnl:1980,trades:19},
  {name:'James Wu',balance:11200,pnl:1200,trades:15},
];

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  currentUser = session.user;
  const { data: profile } = await sb.from('profiles').select('name').eq('id', currentUser.id).single();
  const name = profile?.name || 'Trader';
  document.getElementById('navName').textContent = name.split(' ')[0];
  document.getElementById('navAv').textContent = name.charAt(0).toUpperCase();
  await buildBoard();
  setInterval(buildBoard, 15000);
}

async function buildBoard() {
  const { data } = await sb.from('profiles').select('id,name,balance,total_deposited,created_at').order('balance', { ascending: false }).limit(50);
  const real = (data || []).map(u => ({ id: u.id, name: u.name || 'Trader', balance: u.balance || 0, pnl: (u.balance || 0) - (u.total_deposited || 0), trades: 0, isReal: true, isMe: u.id === currentUser.id }));
  const all = [...real, ...demoTraders.map(d => ({ ...d, isReal: false, isMe: false }))].sort((a, b) => b.balance - a.balance);
  document.getElementById('lastRef').textContent = 'Updated ' + new Date().toLocaleTimeString();

  // Podium
  const top = all.slice(0, 3);
  if (top.length >= 3) {
    const order = [1, 0, 2];
    document.getElementById('podiumWrap').innerHTML = `<div class="podium">${order.map(i => {
      const t = top[i], rank = i + 1;
      const cls = ['r1','r2','r3'][i], bcls = ['b1','b2','b3'][i], emoji = ['🥇','🥈','🥉'][i];
      return `<div class="pod-item" style="order:${i===0?2:i===1?1:3}">
        <div class="pod-av ${cls}">${t.name.charAt(0)}</div>
        <div class="pod-name">${t.name.split(' ')[0]}${t.isMe?'<span class="you-badge">YOU</span>':''}</div>
        <div class="pod-score">$${fmt(Math.max(0,t.pnl))}</div>
        <div class="pod-block ${bcls}">${emoji}</div>
      </div>`;
    }).join('')}</div>`;
  }

  // Table
  const ranks = ['🥇','🥈','🥉'];
  const rankCls = ['gold','silver','bronze'];
  document.getElementById('lbTable').innerHTML = all.map((t, i) => `<div class="lb-row${t.isMe?' me':''}">
    <span class="rank ${i<3?rankCls[i]:''}">${i<3?ranks[i]:'#'+(i+1)}</span>
    <div class="trader-info">
      <div class="trader-av">${t.name.charAt(0)}</div>
      <div><div style="font-weight:500">${t.name}${t.isMe?'<span class="you-badge">YOU</span>':''}</div></div>
    </div>
    <span class="mono">$${fmt(t.balance)}</span>
    <span class="mono ${t.pnl>=0?'green':'red'}">${t.pnl>=0?'+':''}$${Math.abs(t.pnl).toFixed(2)}</span>
    <span class="mono hide-sm">${t.trades||0}</span>
  </div>`).join('');
}

function fmt(n){return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
async function logout(){await sb.auth.signOut();window.location.href='login.html';}
init();
</script>
</body>
</html>
